; ─── Catppuccin Mocha palette ─────────────────────────────────────────────────
[colors]
base      = #1e1e2e
mantle    = #181825
crust     = #11111b
surface0  = #313244
surface1  = #45475a
text      = #cdd6f4
subtext   = #a6adc8
blue      = #89b4fa
lavender  = #b4befe
mauve     = #cba6f7
green     = #a6e3a1
red       = #f38ba8
yellow    = #f9e2af
peach     = #fab387
teal      = #94e2d5
transparent = #00000000

; ─── Bar ──────────────────────────────────────────────────────────────────────
[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 32
radius = 0
fixed-center = true

background = ${colors.base}
foreground = ${colors.text}

line-size = 2
border-size = 0
padding-left = 1
padding-right = 1
module-margin = 1

font-0 = Cascadia Code NF:size=10;2
font-1 = Cascadia Code NF:size=14;3
font-2 = Cascadia Code NF:style=Bold:size=10;2

modules-left = i3
modules-center = prev toggle next sep player shuffle loop play_folder
modules-right = network sep pulseaudio cpu memory battery sep date sep tray powermenu

tray-position = right
tray-padding = 4
tray-background = ${colors.base}

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

wm-restack = i3
override-redirect = false

; ─── Secondary monitor bar (identical to main, but no tray) ──────────────────
; Only one polybar instance per X session can own the system tray, so the
; secondary bar must declare tray-position = none or it will die on startup.
[bar/secondary]
inherit = bar/main
modules-right = network sep pulseaudio cpu memory battery sep date sep powermenu
tray-position = none

; ─── Generic spacer ───────────────────────────────────────────────────────────
[module/sep]
type = custom/text
content = "%{F#45475a}|%{F-}"
content-padding = 0

; ─── i3 workspaces ────────────────────────────────────────────────────────────
[module/i3]
type = internal/i3
pin-workspaces = true
show-urgent = true
strip-wsnumbers = true
index-sort = true
enable-click = true
enable-scroll = false
format = <label-state> <label-mode>

label-mode = %mode%
label-mode-padding = 1
label-mode-foreground = ${colors.base}
label-mode-background = ${colors.peach}

label-focused = %name%
label-focused-foreground = ${colors.base}
label-focused-background = ${colors.lavender}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-foreground = ${colors.subtext}
label-unfocused-background = ${colors.surface0}
label-unfocused-padding = 1

label-visible = %name%
label-visible-foreground = ${colors.text}
label-visible-background = ${colors.surface1}
label-visible-padding = 1

label-urgent = %name%
label-urgent-foreground = ${colors.base}
label-urgent-background = ${colors.red}
label-urgent-padding = 1

label-separator = " "
label-separator-background = ${colors.base}

; ─── Active window title ──────────────────────────────────────────────────────
[module/xwindow]
type = internal/xwindow
format = <label>
format-foreground = ${colors.subtext}
label = %title:0:60:...%

; ─── Clock ────────────────────────────────────────────────────────────────────
[module/date]
type = internal/date
interval = 5
date = %a %d %b
time = %H:%M
label = %{A1:gsimplecal:}%{F#b4befe}%{T2}%{T-}%{F-} %date%  %{F#b4befe}%{T2}%{T-}%{F-} %time%%{A}
format-padding = 1

; ─── Volume (PipeWire via pulse compat) ──────────────────────────────────────
[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
interval = 5

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.text}

format-muted = <label-muted>
label-muted = %{F#f38ba8}%{T2}%{T-} muted%{F-}

ramp-volume-0 = %{F#a6e3a1}%{T2}%{T-}%{F-}
ramp-volume-1 = %{F#a6e3a1}%{T2}%{T-}%{F-}
ramp-volume-2 = %{F#f9e2af}%{T2}%{T-}%{F-}
ramp-volume-3 = %{F#fab387}%{T2}%{T-}%{F-}

click-right = pavucontrol &

; ─── CPU ──────────────────────────────────────────────────────────────────────
[module/cpu]
type = internal/cpu
interval = 2
format = <label>
label = %{F#fab387}%{T2}%{T-}%{F-} %percentage%%

; ─── Memory ───────────────────────────────────────────────────────────────────
[module/memory]
type = internal/memory
interval = 3
format = <label>
label = %{F#f9e2af}%{T2}%{T-}%{F-} %percentage_used%%

; ─── Network (auto-detects wifi/ethernet, hides when offline) ────────────────
[module/network]
type = custom/script
exec = ~/.i3rc/scripts/polybar_network.sh
tail = true
format = <label>
label = %output%

; ─── Battery (auto-hides on desktops with no battery) ────────────────────────
[module/battery]
type = custom/script
exec = ~/.i3rc/scripts/polybar_battery.sh
tail = true
format = <label>
label = %output%

; ─── System tray spacer (tray rendered by bar) ───────────────────────────────
[module/tray]
type = custom/text
content = " "

; ─── Music (playerctl → MPRIS: mpd, Spotify, Firefox, …) ─────────────────────
[module/player]
type = custom/script
exec = ~/.i3rc/scripts/polybar_player.sh
tail = true
format = <label>
label = %output%
label-maxlen = 55
click-left = ~/.i3rc/scripts/polybar_player.sh show-title
click-right = alacritty -e ncmpcpp
scroll-up = ~/.i3rc/scripts/polybar_player.sh next
scroll-down = ~/.i3rc/scripts/polybar_player.sh prev

[module/shuffle]
type = custom/script
exec = ~/.i3rc/scripts/polybar_player.sh shuffle-icon
interval = 2
format = <label>
click-left = ~/.i3rc/scripts/polybar_player.sh shuffle-toggle

[module/loop]
type = custom/script
exec = ~/.i3rc/scripts/polybar_player.sh loop-icon
interval = 2
format = <label>
click-left = ~/.i3rc/scripts/polybar_player.sh loop-cycle

[module/prev]
type = custom/text
content = %{F#a6adc8}%{T2}%{T-}%{F-}
content-padding = 1
click-left = ~/.i3rc/scripts/polybar_player.sh prev

[module/toggle]
type = custom/script
exec = ~/.i3rc/scripts/polybar_player.sh toggle-icon
tail = true
format = <label>
format-foreground = #cba6f7
format-padding = 1
click-left = ~/.i3rc/scripts/polybar_player.sh toggle

[module/next]
type = custom/text
content = %{F#a6adc8}%{T2}%{T-}%{F-}
content-padding = 1
click-left = ~/.i3rc/scripts/polybar_player.sh next

[module/play_folder]
type = custom/script
exec = ~/.i3rc/scripts/polybar_player.sh folder-icon
tail = true
format = <label>
format-padding = 1
click-left = ~/.i3rc/scripts/polybar_player.sh folder-click

; ─── Power menu launcher ──────────────────────────────────────────────────────
[module/powermenu]
type = custom/text
content = %{F#f38ba8}%{T2}%{T-}%{F-}
content-padding = 1
click-left = ~/.i3rc/scripts/powermenu.sh

; ─── Global settings ──────────────────────────────────────────────────────────
[settings]
screenchange-reload = true
pseudo-transparency = false

[global/wm]
margin-top = 0
margin-bottom = 0
