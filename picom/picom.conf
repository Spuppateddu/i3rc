#  ─── Backend & perf ──────────────────────────────────────────────────────
backend = "glx";
vsync = true;
use-damage = true;
unredir-if-possible = false;
detect-rounded-corners = true;
detect-client-opacity = true;

#  ─── Corners ─────────────────────────────────────────────────────────────
corner-radius = 0;
rounded-corners-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g = 'polybar'"
];

#  ─── Shadows ─────────────────────────────────────────────────────────────
shadow = true;
shadow-radius = 20;
shadow-offset-x = -12;
shadow-offset-y = -12;
shadow-opacity = 0.35;
shadow-exclude = [
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'polybar'",
    "_GTK_FRAME_EXTENTS@:c"
];

#  ─── Fades ───────────────────────────────────────────────────────────────
fading = true;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-delta = 6;

#  ─── Opacity ─────────────────────────────────────────────────────────────
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
    "100:class_g = 'firefox'",
    "100:class_g = 'Chromium'",
    "100:class_g = 'Google-chrome'",
    "100:fullscreen"
];

#  ─── Blur (disabled by default; enable if you want frosted feel) ─────────
# blur-method = "dual_kawase";
# blur-strength = 4;
# blur-background = false;

#  ─── Window types ────────────────────────────────────────────────────────
wintypes:
{
    tooltip     = { fade = true; shadow = true; opacity = 0.92; focus = true; };
    dock        = { shadow = false; };
    dnd         = { shadow = false; };
    popup_menu  = { opacity = 0.95; };
    dropdown_menu = { opacity = 0.95; };
};
